name: Sync Copilot Instructions

on:
  push:
    branches: [ main ]
    paths: [ 'CLAUDE.md' ]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Copy CLAUDE.md to .github/copilot-instructions.md
      run: cp CLAUDE.md .github/copilot-instructions.md
    - name: Commit if changed
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .github/copilot-instructions.md
        git diff --cached --quiet || git commit -m "chore: sync copilot-instructions.md from CLAUDE.md"
        git push
