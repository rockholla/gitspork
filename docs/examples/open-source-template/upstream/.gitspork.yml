upstream_owned:
  - .github/**
  - LICENSE
  - CONTRIBUTING.md
downstream_owned:
  - README.md
  - CHANGELOG.md
  # {from, to} rename form: upstream keeps a canonical seed at
  # starter/AUTHORS.md; the downstream receives it at the conventional
  # top-level AUTHORS.md location and owns it thereafter.
  - from: starter/AUTHORS.md
    to: AUTHORS.md
shared_ownership:
  structured:
    prefer_downstream:
      - project-meta.json
templated:
  - template: .gitspork-templates/CODE_OF_CONDUCT.md.go.tmpl
    destination: CODE_OF_CONDUCT.md
    inputs:
      - name: project_name
        json_data_path: project-meta.json
